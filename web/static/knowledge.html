<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pilot Knowledge</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/portal.css" />
    <link rel="stylesheet" href="/static/landing.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js" defer></script>
    <script src="/static/i18n.js" defer></script>
    <script src="/static/pilot-nav.js" defer></script>
    <script src="/static/knowledge.js" defer></script>
  </head>
  <body class="portal-page knowledge-page" data-pilot-page="knowledge" data-pilot-nav="knowledge">
    <header class="pilot-unified-bar pilot-unified-bar--scroll" aria-label="Main navigation">
      <a class="pilot-unified-logo" href="/">Pilot</a>
      <nav class="pilot-unified-links">
        <a href="/" data-pilot-nav-link="hub" data-i18n="navHome">Home</a>
        <a href="/knowledge" data-pilot-nav-link="knowledge" data-i18n="navKnowledge">Knowledge</a>
        <a href="/agent" data-pilot-nav-link="agent" data-i18n="navAgent">Agent</a>
        <a href="/surrogate" data-pilot-nav-link="surrogate" data-i18n="navSurrogate">Surrogate</a>
        <a href="/guide" data-pilot-nav-link="guide" data-i18n="navGuide">Guide</a>
        <a href="/team" data-pilot-nav-link="team" data-i18n="navTeam">Team</a>
        <a href="/api-reference" data-pilot-nav-link="api" data-i18n="navApi">API</a>
      </nav>
    </header>
    <div class="noise" aria-hidden="true"></div>
    <div class="wrap">
      <div class="know-page-head">
        <div class="lang-switch" role="group" aria-label="Language">
          <span class="lang-label" data-i18n="langLabel">Language</span>
          <button type="button" class="lang-btn" data-lang="en">EN</button>
          <button type="button" class="lang-btn" data-lang="zh">中文</button>
        </div>
      </div>
      <p class="section-eyebrow know-eyebrow" data-i18n="knowEyebrow"></p>
      <h1 class="pilot-gradient-headline" data-i18n="knowTitle"></h1>
      <p class="portal-lead know-lead" data-i18n="knowLead"></p>

      <div class="know-stats-bar">
        <div class="know-stat">
          <span class="know-stat-value" id="know-doc-count">0</span>
          <span class="know-stat-label" data-i18n="knowStatLabel"></span>
        </div>
        <span class="know-provider-badge" id="know-provider-badge" data-i18n="knowProviderOffline"></span>
      </div>

      <div class="knowledge-grid">
        <section class="knowledge-panel knowledge-panel--chat">
          <div class="know-panel-head">
            <h2 data-i18n="knowChatTitle"></h2>
          </div>
          <p class="hint know-chat-hint" data-i18n="knowChatHint"></p>
          <div id="knowledge-chat-log" class="know-chat-log" role="log" aria-live="polite"></div>
          <div id="know-grounding-wrap" class="know-grounding-wrap" hidden>
            <h3 class="know-subhead" data-i18n="knowGroundingTitle"></h3>
            <div id="know-grounding" class="know-grounding" role="region" aria-label="Retrieval citations"></div>
          </div>
          <textarea id="knowledge-input" class="know-input" placeholder=""></textarea>
          <div class="portal-actions">
            <button type="button" id="knowledge-send" data-i18n="knowSend"></button>
          </div>
        </section>
        <section class="knowledge-panel knowledge-panel--corpus">
          <div class="know-panel-head">
            <h2 data-i18n="knowCorpusTitle"></h2>
          </div>
          <p class="hint" data-i18n="knowCorpusHint"></p>
          <div class="know-corpus-actions">
            <label class="file-btn portal-actions secondary">
              <span data-i18n="knowUploadBtn"></span>
              <input type="file" id="knowledge-file" accept=".txt,.md,.pdf,.csv,.png,.jpg,.jpeg,.webp" />
            </label>
          </div>
          <div class="know-arxiv-row">
            <input type="text" id="arxiv-query" class="know-arxiv-input" data-i18n-placeholder="knowArxivPh" />
            <button type="button" class="secondary know-arxiv-btn" id="arxiv-fetch" data-i18n="knowArxivBtn"></button>
          </div>
          <h3 class="know-sources-heading" data-i18n="knowSourcesTitle"></h3>
          <p class="hint know-filter-hint" data-i18n="knowFilterHint"></p>
          <div id="knowledge-sources" class="know-sources-list"></div>
        </section>
      </div>
      <footer class="site know-footer" data-i18n="knowFooter"></footer>
    </div>
    <script>
      (function () {
        var bar = document.querySelector(".pilot-unified-bar--scroll");
        if (!bar) return;
        function onScroll() {
          bar.classList.toggle("is-scrolled", window.scrollY > 8);
        }
        onScroll();
        window.addEventListener("scroll", onScroll, { passive: true });
      })();
    </script>
  </body>
</html>
