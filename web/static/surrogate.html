<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pilot Surrogate</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/portal.css" />
    <script src="/static/i18n.js" defer></script>
    <script src="/static/pilot-nav.js" defer></script>
    <script src="/static/surrogate.js" defer></script>
  </head>
  <body class="portal-page" data-pilot-page="surrogate" data-pilot-nav="surrogate">
    <header class="pilot-unified-bar" aria-label="Main navigation">
      <a class="pilot-unified-logo" href="/">Pilot</a>
      <nav class="pilot-unified-links">
        <a href="/" data-pilot-nav-link="hub" data-i18n="navHome">Home</a>
        <a href="/knowledge" data-pilot-nav-link="knowledge" data-i18n="navKnowledge">Knowledge</a>
        <a href="/agent" data-pilot-nav-link="agent" data-i18n="navAgent">Agent</a>
        <a href="/surrogate" data-pilot-nav-link="surrogate" data-i18n="navSurrogate">Surrogate</a>
        <a href="/guide" data-pilot-nav-link="guide" data-i18n="navGuide">Guide</a>
        <a href="/team" data-pilot-nav-link="team" data-i18n="navTeam">Team</a>
        <a href="/docs" data-pilot-nav-link="api" target="_blank" rel="noopener" data-i18n="navApi">API</a>
      </nav>
    </header>
    <div class="noise" aria-hidden="true"></div>
    <div class="wrap">
      <div class="lang-switch" style="justify-content: flex-end; margin-bottom: 1rem" role="group" aria-label="Language">
        <span class="lang-label" data-i18n="langLabel">Language</span>
        <button type="button" class="lang-btn" data-lang="en">EN</button>
        <button type="button" class="lang-btn" data-lang="zh">中文</button>
      </div>
      <h1 class="pilot-gradient-headline" data-i18n="surTitle">Pilot Surrogate models</h1>
      <p class="portal-lead" data-i18n="surLead"></p>
      <h2 style="font-size: 1.1rem; margin: 1.5rem 0 0.75rem; color: #e8a54b" data-i18n="surCatalogTitle">Catalog</h2>
      <div id="surrogate-list" class="surrogate-list"></div>
      <h2 style="font-size: 1.1rem; margin: 2rem 0 0.75rem; color: #5b9fd4" data-i18n="surRegisterTitle">Register</h2>
      <p class="hint" style="margin: 0 0 0.75rem; font-size: 0.85rem" data-i18n="surRegisterHint"></p>
      <form class="register-form" id="sur-register">
        <input type="text" name="entry_id" placeholder="id" required pattern="[a-z0-9._-]+" />
        <input type="text" name="title_en" placeholder="Title EN" />
        <input type="text" name="title_zh" placeholder="Title ZH" />
        <textarea name="desc_en" placeholder="Desc EN"></textarea>
        <textarea name="desc_zh" placeholder="Desc ZH"></textarea>
        <input type="url" name="paper_url" placeholder="Paper URL" />
        <input type="url" name="code_url" placeholder="Code URL" />
        <input type="text" name="register_key" placeholder="X-Pilot-Register-Key (if set)" autocomplete="off" />
        <div class="portal-actions">
          <button type="submit" data-i18n="surSubmit">Submit</button>
        </div>
      </form>
      <h2 style="font-size: 1.1rem; margin: 2rem 0 0.75rem; color: #5b9fd4" data-i18n="surBundleTitle">Upload</h2>
      <p class="hint" style="margin: 0 0 0.75rem; font-size: 0.85rem" data-i18n="surBundleHint"></p>
      <form id="sur-bundle" class="register-form">
        <input type="text" name="surrogate_id" placeholder="surrogate id" required pattern="[a-z0-9._-]+" />
        <input type="file" name="bundle" required />
        <input type="text" name="register_key" placeholder="X-Pilot-Register-Key" autocomplete="off" />
        <div class="portal-actions">
          <button type="submit" data-i18n="surBundleBtn">Upload zip</button>
        </div>
      </form>
      <footer class="site" style="margin-top: 2rem" data-i18n="surFooter"></footer>
    </div>
  </body>
</html>
