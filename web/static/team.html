<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pilot — Team</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/portal.css" />
    <script src="/static/i18n.js" defer></script>
    <script src="/static/pilot-nav.js" defer></script>
  </head>
  <body class="team-page" data-pilot-page="team" data-pilot-nav="team">
    <header class="pilot-unified-bar" aria-label="Main navigation">
      <a class="pilot-unified-logo" href="/">Pilot</a>
      <nav class="pilot-unified-links">
        <a href="/" data-pilot-nav-link="hub" data-i18n="navHome">Home</a>
        <a href="/knowledge" data-pilot-nav-link="knowledge" data-i18n="navKnowledge">Knowledge</a>
        <a href="/agent" data-pilot-nav-link="agent" data-i18n="navAgent">Agent</a>
        <a href="/surrogate" data-pilot-nav-link="surrogate" data-i18n="navSurrogate">Surrogate</a>
        <a href="/guide" data-pilot-nav-link="guide" data-i18n="navGuide">Guide</a>
        <a href="/team" data-pilot-nav-link="team" data-i18n="navTeam">Team</a>
        <a href="/docs" data-pilot-nav-link="api" target="_blank" rel="noopener" data-i18n="navApi">API</a>
      </nav>
    </header>
    <div class="noise" aria-hidden="true"></div>
    <div class="wrap">
      <div class="lang-switch" style="justify-content: flex-end; margin-bottom: 1rem" role="group" aria-label="Language">
        <span class="lang-label" data-i18n="langLabel">Language</span>
        <button type="button" class="lang-btn" data-lang="en">EN</button>
        <button type="button" class="lang-btn" data-lang="zh">中文</button>
      </div>
      <h1 class="pilot-gradient-headline" data-i18n="teamHeroTitle">Team</h1>
      <p class="portal-lead" data-i18n="teamHeroLead"></p>
      <div class="team-card">
        <p data-i18n="teamHeroLead"></p>
        <p><a href="/" data-i18n="teamBackHome">← Home</a></p>
      </div>
      <footer class="site" data-i18n="teamFooter"></footer>
    </div>
  </body>
</html>
